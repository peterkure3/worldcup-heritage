services:
  postgres:
    image: postgres:16-alpine
    container_name: worldcup-db
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worldcup-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: worldcup-api
    ports:
      - "7777:7777"
    environment:
      DATABASE_URL: postgres://worldcup:worldcup@postgres:5432/worldcup
      HOST: 0.0.0.0
      PORT: "7777"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - worldcup-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: worldcup-web
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - worldcup-net

  pipeline:
    profiles:
      - manual
    build:
      context: pipeline
      dockerfile: Dockerfile
    container_name: worldcup-pipeline
    environment:
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
    volumes:
      - ./artifacts:/app/artifacts
      - ./pipeline/data:/app/data
    command: python data_ingestion/fetch_data.py
    networks:
      - worldcup-net

networks:
  worldcup-net:
    driver: bridge

volumes:
  pgdata:
